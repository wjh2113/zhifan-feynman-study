services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: zhifan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zhifan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - zhifan_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zhifan"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  zhifan_postgres_data:

